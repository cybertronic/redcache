apiVersion: v1
kind: Pod
metadata:
  name: pytorch-training-example
  namespace: default
spec:
  # Schedule on GPU node (cache agent will be running there)
  nodeSelector:
    nvidia.com/gpu: "true"
  
  containers:
  - name: trainer
    image: pytorch/pytorch:2.0.0-cuda11.7-cudnn8-runtime
    
    # Point S3 client to local cache proxy
    env:
    - name: S3_ENDPOINT
      value: "http://localhost:8080"
    # Alternative: AWS SDK environment variable
    - name: AWS_ENDPOINT_URL
      value: "http://localhost:8080"
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-credentials
          key: access-key-id
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-credentials
          key: secret-access-key
    - name: S3_BUCKET
      value: "my-training-data"
    - name: DATASET_PATH
      value: "imagenet/train"
    
    command:
    - python
    - /workspace/train.py
    
    resources:
      limits:
        nvidia.com/gpu: 8
        memory: "400Gi"
        cpu: "56"
      requests:
        nvidia.com/gpu: 8
        memory: "400Gi"
        cpu: "56"
    
    volumeMounts:
    - name: workspace
      mountPath: /workspace
  
  volumes:
  - name: workspace
    emptyDir: {}
  
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

---
# Example training script ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: training-script
  namespace: default
data:
  train.py: |
    #!/usr/bin/env python3
    """
    Example PyTorch training script using S3 cache proxy
    """
    import os
    import boto3
    import torch
    from torch.utils.data import Dataset, DataLoader
    import io
    from PIL import Image
    
    class S3Dataset(Dataset):
        """Dataset that loads data from S3 through cache proxy"""
        
        def __init__(self, bucket, prefix, transform=None):
            # S3 client automatically uses cache proxy via S3_ENDPOINT env var
            self.s3 = boto3.client('s3', 
                endpoint_url=os.getenv('S3_ENDPOINT', 'http://localhost:8080'))
            self.bucket = bucket
            self.prefix = prefix
            self.transform = transform
            
            # List all objects (this will be cached too)
            print(f"Listing objects from s3://{bucket}/{prefix}")
            response = self.s3.list_objects_v2(
                Bucket=bucket,
                Prefix=prefix
            )
            self.keys = [obj['Key'] for obj in response.get('Contents', [])]
            print(f"Found {len(self.keys)} objects")
        
        def __len__(self):
            return len(self.keys)
        
        def __getitem__(self, idx):
            key = self.keys[idx]
            
            # Get object from S3 (will be served from cache if available)
            # First access: cache miss (~50-100ms from S3)
            # Subsequent accesses: cache hit (<1ms from local NVMe)
            response = self.s3.get_object(Bucket=self.bucket, Key=key)
            data = response['Body'].read()
            
            # Check if it was a cache hit
            cache_status = response.get('ResponseMetadata', {}).get(
                'HTTPHeaders', {}).get('x-cache', 'UNKNOWN')
            
            # Load image
            image = Image.open(io.BytesIO(data))
            
            if self.transform:
                image = self.transform(image)
            
            return image, cache_status
    
    def main():
        print("=" * 80)
        print("PyTorch Training with GPU Cache")
        print("=" * 80)
        
        # Configuration
        bucket = os.getenv('S3_BUCKET', 'my-training-data')
        dataset_path = os.getenv('DATASET_PATH', 'imagenet/train')
        batch_size = 256
        num_workers = 8
        
        print(f"\nConfiguration:")
        print(f"  S3 Endpoint: {os.getenv('S3_ENDPOINT', 'default')}")
        print(f"  Bucket: {bucket}")
        print(f"  Dataset: {dataset_path}")
        print(f"  Batch Size: {batch_size}")
        print(f"  Workers: {num_workers}")
        
        # Create dataset
        print(f"\nInitializing dataset...")
        dataset = S3Dataset(bucket, dataset_path)
        
        # Create dataloader
        dataloader = DataLoader(
            dataset,
            batch_size=batch_size,
            num_workers=num_workers,
            shuffle=True,
            pin_memory=True
        )
        
        # Training loop
        print(f"\nStarting training...")
        cache_hits = 0
        cache_misses = 0
        
        for epoch in range(3):
            print(f"\nEpoch {epoch + 1}/3")
            
            for batch_idx, (images, cache_statuses) in enumerate(dataloader):
                # Count cache hits/misses
                hits = sum(1 for s in cache_statuses if s == 'HIT')
                misses = sum(1 for s in cache_statuses if s == 'MISS')
                cache_hits += hits
                cache_misses += misses
                
                # Simulate training
                # In real training, you would:
                # - Move data to GPU
                # - Forward pass
                # - Backward pass
                # - Optimizer step
                
                if batch_idx % 10 == 0:
                    total = cache_hits + cache_misses
                    hit_rate = cache_hits / total if total > 0 else 0
                    print(f"  Batch {batch_idx}: "
                          f"Cache Hit Rate: {hit_rate:.2%} "
                          f"({cache_hits} hits, {cache_misses} misses)")
        
        print("\n" + "=" * 80)
        print("Training Complete!")
        total = cache_hits + cache_misses
        final_hit_rate = cache_hits / total if total > 0 else 0
        print(f"Final Cache Hit Rate: {final_hit_rate:.2%}")
        print(f"Total Requests: {total}")
        print(f"Cache Hits: {cache_hits}")
        print(f"Cache Misses: {cache_misses}")
        print("=" * 80)
    
    if __name__ == '__main__':
        main()

---
# Example: Job with cache pre-warming
apiVersion: batch/v1
kind: Job
metadata:
  name: cache-warmup
  namespace: default
spec:
  template:
    spec:
      nodeSelector:
        nvidia.com/gpu: "true"
      
      restartPolicy: OnFailure
      
      containers:
      - name: warmup
        image: amazon/aws-cli:latest
        
        env:
        - name: AWS_ENDPOINT_URL
          value: "http://localhost:8080"
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        
        command:
        - /bin/bash
        - -c
        - |
          echo "Pre-warming cache for training dataset..."
          
          # List and download all training files
          # This will populate the cache before training starts
          aws s3 ls s3://my-training-data/imagenet/train/ --recursive | \
          while read -r line; do
            key=$(echo $line | awk '{print $4}')
            echo "Downloading: $key"
            aws s3 cp "s3://my-training-data/$key" /tmp/warmup/ || true
          done
          
          echo "Cache warm-up complete!"
      
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule